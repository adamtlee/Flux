[supervisord]
nodaemon=true

[program:flux-api]
command=dotnet /app/Flux.Api.dll
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/flux-api.err.log
stdout_logfile=/var/log/flux-api.out.log

[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx.err.log
stdout_logfile=/var/log/nginx.out.log
