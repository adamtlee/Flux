<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <a routerLink="/">Flux</a>
    </div>
    <div class="nav-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        Home
      </a>
      <a routerLink="/accounts" routerLinkActive="active" class="nav-link" *ngIf="isAuthenticated$ | async">
        Accounts
      </a>
      <div class="nav-auth">
        <span class="current-user" *ngIf="currentUser$ | async as user">
          Welcome, {{ user }}
        </span>
        <button 
          *ngIf="isAuthenticated$ | async" 
          (click)="logout()" 
          class="btn btn-logout">
          Sign Out
        </button>
        <a 
          *ngIf="!(isAuthenticated$ | async)" 
          routerLink="/login" 
          class="btn btn-login">
          Sign In
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="main-content">
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-content">
    <p>&copy; 2026 Flux Financial Platform. All rights reserved.</p>
  </div>
</footer>
