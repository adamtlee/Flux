<div class="home-container">
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to Flux</h1>
      <p>Your Personal Financial Management Platform</p>
      <div class="hero-buttons">
        <button class="btn btn-primary" routerLink="/accounts">
          View Accounts
        </button>
        <button class="btn btn-secondary">
          Learn More
        </button>
      </div>
    </div>
    <div class="hero-visual">
      <div class="gradient-circle"></div>
    </div>
  </section>

  <!-- Features Section -->
  <section class="features">
    <h2>Why Choose Flux?</h2>
    <div class="features-grid">
      <div *ngFor="let feature of features" class="feature-card">
        <div class="feature-icon">{{ feature.icon }}</div>
        <h3>{{ feature.title }}</h3>
        <p>{{ feature.description }}</p>
      </div>
    </div>
  </section>

  <!-- CTA Section -->
  <section class="cta">
    <h2>Ready to Get Started?</h2>
    <p>Manage your accounts and track your finances in one secure platform</p>
    <button class="btn btn-primary btn-large" routerLink="/accounts">
      Explore Your Accounts
    </button>
  </section>
</div>
